name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run test
      - run: npm run build

  android:
    runs-on: ubuntu-latest
    needs: web
    if: ${{ false }}
    steps:
      - run: echo "Enable this job after Android signing/configuration is finalised. Local commands are documented in PLAY_STORE_RELEASE_CHECKLIST.md."
