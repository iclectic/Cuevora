<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <title>Cuevora — Free Teleprompter</title>
    <meta name="description" content="Teleprompter features, actually free. Mirror mode, camera preview, adjustable speed, themes, and more." />
    <meta name="author" content="Cuevora" />

    <!-- Theme & status bar -->
    <meta name="theme-color" content="#1e1b4b" />
    <meta name="color-scheme" content="dark light" />

    <!-- PWA manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Apple mobile web app -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Cuevora" />
    <link rel="apple-touch-icon" href="/icons/icon-192.svg" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/icons/icon-192.svg" />
    <link rel="icon" href="/favicon.ico" />

    <!-- Open Graph -->
    <meta property="og:title" content="Cuevora — Free Teleprompter" />
    <meta property="og:description" content="Teleprompter features, actually free. Mirror mode, camera preview, adjustable speed, themes, and more." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/icons/icon-512.svg" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Cuevora — Free Teleprompter" />
    <meta name="twitter:image" content="/icons/icon-512.svg" />

    <!-- Prevent tap highlight on mobile -->
    <style>
      * { -webkit-tap-highlight-color: transparent; }
      html, body { overscroll-behavior: none; }
      /* Native splash: shown before React mounts, hidden by React */
      #native-splash {
        position: fixed; inset: 0; z-index: 99999;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        background: #1e1b4b;
        transition: opacity 0.3s ease;
      }
      #native-splash.hidden { opacity: 0; pointer-events: none; }
      #native-splash svg { width: 72px; height: 72px; margin-bottom: 20px; }
      #native-splash h1 { color: #f0f0f0; font-size: 28px; font-weight: 700; letter-spacing: -0.5px; font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif; }
      #native-splash p { color: #a78bfa; font-size: 13px; font-weight: 500; margin-top: 6px; font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif; }
    </style>
  </head>

  <body>
    <!-- Native splash shown instantly before JS loads -->
    <div id="native-splash">
      <svg viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="nsCGrad" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#a78bfa"/><stop offset="100%" stop-color="#7c3aed"/></linearGradient>
          <linearGradient id="nsAccent" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#f59e0b"/><stop offset="100%" stop-color="#d97706"/></linearGradient>
        </defs>
        <rect width="512" height="512" rx="108" fill="#1e1b4b"/>
        <path d="M310 130 C200 130,120 200,120 256 C120 312,200 382,310 382" stroke="url(#nsCGrad)" stroke-width="48" fill="none" stroke-linecap="round"/>
        <rect x="200" y="220" width="140" height="12" rx="6" fill="url(#nsAccent)" opacity="0.9"/>
        <rect x="200" y="250" width="110" height="12" rx="6" fill="url(#nsAccent)" opacity="0.65"/>
        <rect x="200" y="280" width="80" height="12" rx="6" fill="url(#nsAccent)" opacity="0.4"/>
        <path d="M360 230 L395 256 L360 282 Z" fill="#f59e0b" opacity="0.85"/>
      </svg>
      <h1>Cuevora</h1>
      <p>Teleprompter features, actually free.</p>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Register service worker for PWA
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('%BASE_URL%sw.js').catch(() => {});
        });
      }
    </script>
  </body>
</html>
